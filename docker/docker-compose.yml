services:
  # ─────────────────────────────────────────────
  # PicoClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm picoclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  picoclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      network: host
      args:
        HTTP_PROXY: http://127.0.0.1:7890
        HTTPS_PROXY: http://127.0.0.1:7890
        NO_PROXY: localhost,127.0.0.1,::1
        http_proxy: http://127.0.0.1:7890
        https_proxy: http://127.0.0.1:7890
        no_proxy: localhost,127.0.0.1,::1
    container_name: picoclaw-agent
    network_mode: host
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ../config/config.json:/home/picoclaw/.picoclaw/config.json:ro
      - picoclaw-workspace:/home/picoclaw/.picoclaw/workspace
    environment:
      TZ: Asia/Shanghai
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: localhost,127.0.0.1,::1
      http_proxy: http://127.0.0.1:7890
      https_proxy: http://127.0.0.1:7890
      no_proxy: localhost,127.0.0.1,::1
      ALL_PROXY: socks5://127.0.0.1:7890
      all_proxy: socks5://127.0.0.1:7890
      # Optional: remote embeddings for semantic memory (OpenAI-compatible /v1/embeddings)
      # - Use either EMBEDDING_* (compat) or PICOCLAW_EMBEDDING_* (preferred)
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-}
      EMBEDDING_PROXY: ${EMBEDDING_PROXY:-}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-}
      EMBEDDING_REQUEST_TIMEOUT_SECONDS: ${EMBEDDING_REQUEST_TIMEOUT_SECONDS:-}
      PICOCLAW_EMBEDDING_KIND: ${PICOCLAW_EMBEDDING_KIND:-}
      PICOCLAW_EMBEDDING_API_KEY: ${PICOCLAW_EMBEDDING_API_KEY:-}
      PICOCLAW_EMBEDDING_API_BASE: ${PICOCLAW_EMBEDDING_API_BASE:-}
      PICOCLAW_EMBEDDING_MODEL: ${PICOCLAW_EMBEDDING_MODEL:-}
      PICOCLAW_EMBEDDING_PROXY: ${PICOCLAW_EMBEDDING_PROXY:-}
      PICOCLAW_EMBEDDING_BATCH_SIZE: ${PICOCLAW_EMBEDDING_BATCH_SIZE:-}
      PICOCLAW_EMBEDDING_REQUEST_TIMEOUT_SECONDS: ${PICOCLAW_EMBEDDING_REQUEST_TIMEOUT_SECONDS:-}
    command: ["agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PicoClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml up picoclaw-gateway
  # ─────────────────────────────────────────────
  picoclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      network: host
      args:
        HTTP_PROXY: http://127.0.0.1:7890
        HTTPS_PROXY: http://127.0.0.1:7890
        NO_PROXY: localhost,127.0.0.1,::1
        http_proxy: http://127.0.0.1:7890
        https_proxy: http://127.0.0.1:7890
        no_proxy: localhost,127.0.0.1,::1
    container_name: picoclaw-gateway
    network_mode: host
    restart: unless-stopped
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      # Configuration file
      - ../config/config.json:/home/picoclaw/.picoclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - picoclaw-workspace:/home/picoclaw/.picoclaw/workspace
    environment:
      TZ: Asia/Shanghai
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: localhost,127.0.0.1,::1
      http_proxy: http://127.0.0.1:7890
      https_proxy: http://127.0.0.1:7890
      no_proxy: localhost,127.0.0.1,::1
      ALL_PROXY: socks5://127.0.0.1:7890
      all_proxy: socks5://127.0.0.1:7890
      # Optional: remote embeddings for semantic memory (OpenAI-compatible /v1/embeddings)
      # - Use either EMBEDDING_* (compat) or PICOCLAW_EMBEDDING_* (preferred)
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-}
      EMBEDDING_PROXY: ${EMBEDDING_PROXY:-}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-}
      EMBEDDING_REQUEST_TIMEOUT_SECONDS: ${EMBEDDING_REQUEST_TIMEOUT_SECONDS:-}
      PICOCLAW_EMBEDDING_KIND: ${PICOCLAW_EMBEDDING_KIND:-}
      PICOCLAW_EMBEDDING_API_KEY: ${PICOCLAW_EMBEDDING_API_KEY:-}
      PICOCLAW_EMBEDDING_API_BASE: ${PICOCLAW_EMBEDDING_API_BASE:-}
      PICOCLAW_EMBEDDING_MODEL: ${PICOCLAW_EMBEDDING_MODEL:-}
      PICOCLAW_EMBEDDING_PROXY: ${PICOCLAW_EMBEDDING_PROXY:-}
      PICOCLAW_EMBEDDING_BATCH_SIZE: ${PICOCLAW_EMBEDDING_BATCH_SIZE:-}
      PICOCLAW_EMBEDDING_REQUEST_TIMEOUT_SECONDS: ${PICOCLAW_EMBEDDING_REQUEST_TIMEOUT_SECONDS:-}
    command: ["gateway"]

volumes:
  picoclaw-workspace:
